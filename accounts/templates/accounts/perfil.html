{% extends 'noticias/base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Mi Perfil</h4>
            </div>
            <div class="card-body text-center">
                {% if perfil.avatar %}
                    <img src="{{ perfil.avatar.url }}" class="rounded-circle mb-3" width="150" height="150" alt="Avatar">
                {% else %}
                    <img src="https://via.placeholder.com/150" class="rounded-circle mb-3" alt="Avatar">
                {% endif %}

                <h5>{{ request.user.get_full_name|default:request.user.username }}</h5>
                <p class="text-muted">{{ request.user.email }}</p>
                <p>{{ perfil.biografia }}</p>

                <a href="{% url 'editar_perfil' %}" class="btn btn-dark">Editar perfil</a>
                <a href="{% url 'cambiar_password' %}" class="btn btn-secondary">Cambiar contraseña</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
