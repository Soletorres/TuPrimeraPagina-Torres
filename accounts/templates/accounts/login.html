{% extends 'noticias/base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Iniciar Sesión</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100">Ingresar</button>
                </form>
                <p class="mt-3 text-center">¿No tenés cuenta? <a href="{% url 'registro' %}">Registrate</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
