{% extends 'noticias/base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Editar Perfil</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <h6 class="text-muted">Datos personales</h6>
                    {{ usuario_form.as_p }}
                    <hr>
                    <h6 class="text-muted">Perfil</h6>
                    {{ perfil_form.as_p }}
                    <button type="submit" class="btn btn-dark w-100">Guardar cambios</button>
                </form>
                <a href="{% url 'perfil' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
