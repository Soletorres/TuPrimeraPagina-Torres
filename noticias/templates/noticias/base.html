<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pulso - Portal de Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Pulso</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Inicio</a>
                <a class="nav-link" href="{% url 'about' %}">Acerca de nosotros</a>
                <a class="nav-link" href="/buscar/">Buscar</a>
                {% if user.is_authenticated %}
                    <a class="nav-link" href="/nueva-noticia/">Nueva Noticia</a>
                    <a class="nav-link" href="{% url 'bandeja_entrada' %}">Mensajes</a>
                    <a class="nav-link" href="{% url 'perfil' %}">Mi Perfil</a>
                    <a class="nav-link" href="{% url 'logout' %}">Cerrar Sesion</a>
                    {% if user.is_staff %}
                        <a class="nav-link" href="/nueva-categoria/">Nueva Categoria</a>
                        <a class="nav-link" href="/nuevo-autor/">Nuevo Autor</a>
                    {% endif %}
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Iniciar Sesion</a>
                    <a class="nav-link" href="{% url 'registro' %}">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block contenido %}
        {% endblock %}
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">Pulso - Portal de Noticias 2026</p>
    </footer>

</body>
</html>
