{% extends 'noticias/base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">✉️ Nuevo Mensaje</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100">Enviar</button>
                </form>
                <a href="{% url 'bandeja_entrada' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
