{% extends 'noticias/base.html' %}

{% block contenido %}
<div class="card">
    <div class="card-header bg-dark text-white">
        <h4 class="mb-0">{{ mensaje.asunto }}</h4>
    </div>
    <div class="card-body">
        <p><strong>De:</strong> {{ mensaje.remitente.username }}</p>
        <p><strong>Para:</strong> {{ mensaje.destinatario.username }}</p>
        <p><strong>Fecha:</strong> {{ mensaje.fecha|date:"d/m/Y H:i" }}</p>
        <hr>
        <p>{{ mensaje.contenido }}</p>
        <hr>
        <a href="{% url 'enviar_mensaje' %}" class="btn btn-dark">Responder</a>
        <a href="{% url 'bandeja_entrada' %}" class="btn btn-secondary">Volver</a>
    </div>
</div>
{% endblock %}
